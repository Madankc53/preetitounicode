    display: flex;
    background: var(--parchment);

    border: 1px solid rgba(212,168,75,0.3);

  .tab-btn {
    flex: 1;
    padding: 10px 24px;
    border: none;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--ink-soft);
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
  }
  .tab-btn.active {
    background: var(--crimson);
    color: white;
    box-shadow: 0 2px 10px rgba(192,57,43,0.35);
  }
  .tab-btn:not(.active):hover {
    background: rgba(192,57,43,0.08);
    color: var(--crimson);
  }

  /* Card */

    background: white;
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 460px;
    box-shadow:

    border: 1px solid rgba(212,168,75,0.2);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;

    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(212,168,75,0.4), transparent);

  .selects-row {
    display: grid;
    grid-template-columns: 2fr 2fr 1.5fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .select-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 5px;
    letter-spacing: 0.5px;

    font-weight: 400;

    border-radius: 10px;

  .today-btn:hover {

    border-color: var(--gold);
    color: var(--ink);

const REF_BS_MONTH = 1;
const REF_BS_DAY   = 1;

  const y = parseInt(bsYearSel.value);

  for (let d = 1; d <= maxDay; d++) {

// ── Core conversion functions ─────────────────────────────────

function bsToAdDays(bsYear, bsMonth, bsDay) {
  let totalDays = 0;
  for (let y = REF_BS_YEAR; y < bsYear; y++) {
    if (!bsData[y]) return null;
    for (let m = 0; m < 12; m++) totalDays += bsData[y][m];
  }
  if (!bsData[bsYear]) return null;
  for (let m = 0; m < bsMonth - 1; m++) totalDays += bsData[bsYear][m];
  totalDays += bsDay - 1;
  const adDate = new Date(REF_AD_DATE);
  adDate.setDate(adDate.getDate() + totalDays);
  return adDate;
}

function adToBS(adYear, adMonth, adDay) {
  const adDate = new Date(adYear, adMonth - 1, adDay);
  const diffMs = adDate - REF_AD_DATE;
  if (diffMs < 0) return null;
  let remainDays = Math.round(diffMs / 86400000);

  let bsYear = REF_BS_YEAR;
  let bsMonth = 1;

  while (true) {
    if (!bsData[bsYear]) return null;
    const yearDays = bsData[bsYear].reduce((a,b)=>a+b,0);
    if (remainDays < yearDays) break;
    remainDays -= yearDays;
    bsYear++;
  }

  for (let m = 0; m < 12; m++) {
    const mDays = bsData[bsYear][m];
    if (remainDays < mDays) { bsMonth = m + 1; break; }
    remainDays -= mDays;
  }

  return { year: bsYear, month: bsMonth, day: remainDays + 1 };
}

// ── UI helpers ────────────────────────────────────────────────

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}
function hideError(id) { document.getElementById(id).classList.remove('show'); }
function hideResult(id) { document.getElementById(id).classList.remove('show'); }

function convertBSToAD() {
  hideError('bs-error');
  const y = parseInt(bsYearSel.value);
  const m = parseInt(bsMonthSel.value);
  const d = parseInt(bsDaySel.value);

  if (!bsData[y]) { showError('bs-error','Year out of range (2000–2090)'); return; }
  const maxD = bsData[y][m-1];
  if (d > maxD) { showError('bs-error',`Day ${d} doesn't exist in ${BS_MONTHS[m-1]} ${y} BS (max ${maxD})`); return; }

  const adDate = bsToAdDays(y, m, d);
  if (!adDate) { showError('bs-error','Conversion failed'); return; }

  const dayName = WEEKDAYS[adDate.getDay()];
  const adM = AD_MONTHS[adDate.getMonth()];

  document.getElementById('bs-result-date').textContent =
    `${dayName}, ${adDate.getDate()} ${adM} ${adDate.getFullYear()}`;
  document.getElementById('bs-result-sub').innerHTML =
    `<span><span class="dot"></span> ${y} ${BS_MONTHS[m-1]} ${d} BS</span>
     <span><span class="dot"></span> ${adDate.getDate()}/${adDate.getMonth()+1}/${adDate.getFullYear()}</span>`;

  document.getElementById('bs-result').classList.add('show');
}

function convertADToBS() {
  hideError('ad-error');
  const y = parseInt(adYearSel.value);
  const m = parseInt(adMonthSel.value);
  const d = parseInt(adDaySel.value);

  const bs = adToBS(y, m, d);
  if (!bs) { showError('ad-error','Date is outside supported BS range (2000–2090)'); return; }

  const adDate = new Date(y, m-1, d);
  const dayName = WEEKDAYS[adDate.getDay()];

  document.getElementById('ad-result-date').textContent =
    `${bs.year} ${BS_MONTHS[bs.month-1]} ${bs.day}`;
  document.getElementById('ad-result-sub').innerHTML =
    `<span><span class="dot"></span> ${dayName}</span>
     <span><span class="dot"></span> ${AD_MONTHS[m-1]} ${d}, ${y} AD</span>
     <span><span class="dot"></span> Month ${bs.month} of ${bs.year} BS</span>`;

  document.getElementById('ad-result').classList.add('show');
}

// ── Today shortcuts ────────────────────────────────────────────

function setTodayAD() {
  const t = new Date();
  adYearSel.value = t.getFullYear();
  adMonthSel.value = t.getMonth() + 1;
  populateADDays();
  adDaySel.value = t.getDate();
}

function setTodayBS() {
  // Derive today's BS from today's AD
  const t = new Date();
  const bs = adToBS(t.getFullYear(), t.getMonth()+1, t.getDate());
  if (!bs) return;
  bsYearSel.value = bs.year;
  bsMonthSel.value = bs.month;
  populateBSDays();
  bsDaySel.value = bs.day;
}

// Auto-populate today on load
setTodayBS();
</script>
