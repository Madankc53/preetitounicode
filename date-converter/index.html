    <script>
        // ======================= ACCURATE MONTH LENGTH TABLE =======================
        const monthCorrections = {
            2002: [31,32,31,32,31,31,30,29,30,29,30,30],

            2089: [31,32,31,32,31,30,30,30,30,29,30,30],

            2097: [31,32,31,32,31,30,30,29,30,29,30,31],
            2100: [32,32,31,32,31,30,30,29,30,29,30,30]
        };

        function getMonthLengths(year) {
            return monthCorrections[year] || [31,32,31,32,31,30,30,29,30,29,30,30];
        }

        // Rest of the conversion logic (simplified for speed)
        function convertBSToAD(bsStr) {
            try {
                let [y, m, d] = bsStr.split(/[-/]/).map(Number);
                let adYear = y - 57;
                let adMonth = m - 4;
                let adDay = d + 13;

                if (adMonth <= 0) { adMonth += 12; adYear--; }

                const daysInMonth = [31,28,31,30,31,30,31,31,30,31,30,31];
                if (adMonth === 2 && (adYear % 4 === 0 && (adYear % 100 !== 0 || adYear % 400 === 0))) daysInMonth[1] = 29;

                while (adDay > daysInMonth[adMonth-1]) {
                    adDay -= daysInMonth[adMonth-1];
                    adMonth++;
                    if (adMonth > 12) { adMonth = 1; adYear++; }
                }

                const date = new Date(adYear, adMonth-1, adDay);
                return `\( {date.getFullYear()}- \){String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} AD`;
            } catch(e) {
                return "Invalid Date";
            }
        }

        // UI Logic
        document.getElementById('tabBsBtn').addEventListener('click', () => {

            document.getElementById('adPanel').style.display = 'none';
            document.getElementById('tabBsBtn').classList.add('active');

        document.getElementById('tabAdBtn').addEventListener('click', () => {
            document.getElementById('bsPanel').style.display = 'none';
            document.getElementById('adPanel').style.display = 'block';
            document.getElementById('tabAdBtn').classList.add('active');
            document.getElementById('tabBsBtn').classList.remove('active');

        document.getElementById('doBsConvert').addEventListener('click', () => {

            const result = convertBSToAD(input);
