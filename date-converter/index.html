<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BS to AD & AD to BS Date Converter - Accurate for all years including old dates like 1950 BS">
    <title>BS to AD Date Converter Nepal - Accurate Bikram Sambat Converter</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap');
        
        :root { --primary: #dc2626; }
        body { 
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif; 
            background: linear-gradient(135deg, #f8fafc, #e0f2fe); 
            margin: 0; padding: 0;
        }
        .container { 
            max-width: 560px; margin: 30px auto; background: white; 
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            overflow: hidden; border-top: 6px solid var(--primary);
        }
        .header-title { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; padding: 25px; text-align: center; }
        h1 { margin: 0; font-size: 1.85rem; }
        .converter-body { padding: 30px 25px; }
        .tabs { display: flex; background: #f1f5f9; border-radius: 12px; padding: 5px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 14px; text-align: center; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .tab.active { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 16px; }
        .result { 
            background: #fefce8; border: 2px dashed #ca8a04; border-radius: 16px; 
            padding: 25px; text-align: center; margin: 25px 0; font-size: 1.4rem; 
        }
        button {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="header"></div>

    <div class="container">
        <div class="header-title">
            <h1>BS ↔ AD Date Converter</h1>
            <p>Accurate Nepali Date Converter</p>
        </div>

        <div class="converter-body">
            <div class="tabs">
                <div class="tab active" id="tabBS">BS → AD</div>
                <div class="tab" id="tabAD">AD → BS</div>
            </div>

            <div id="bsForm">
                <div class="input-group">
                    <label>BS Date (e.g. 1950-08-15)</label>
                    <input type="text" id="bsDate" value="1950-01-01" placeholder="1950-01-01">
                </div>
                <button onclick="convertBSToAD()">Convert BS to AD</button>
            </div>

            <div id="adForm" style="display:none;">
                <div class="input-group">
                    <label>AD Date (e.g. 1893-04-15)</label>
                    <input type="text" id="adDate" value="1893-04-15" placeholder="1893-04-15">
                </div>
                <button onclick="convertADToBS()">Convert AD to BS</button>
            </div>

            <div class="result" id="result">परिणाम यहाँ आउँछ...</div>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        // Tab Switch
        document.getElementById('tabBS').addEventListener('click', () => {
            document.getElementById('bsForm').style.display = 'block';
            document.getElementById('adForm').style.display = 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tabBS').classList.add('active');
        });

        document.getElementById('tabAD').addEventListener('click', () => {
            document.getElementById('bsForm').style.display = 'none';
            document.getElementById('adForm').style.display = 'block';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tabAD').classList.add('active');
        });

        function convertBSToAD() {
            let input = document.getElementById('bsDate').value.trim();
            const resultDiv = document.getElementById('result');
            
            try {
                let [bsYear, bsMonth, bsDay] = input.split(/[-\/]/).map(n => parseInt(n));
                
                let adYear = bsYear - 57;
                let adMonth = bsMonth - 4;
                let adDay = bsDay + 13;

                if (adMonth <= 0) {
                    adMonth += 12;
                    adYear--;
                }

                if (adDay > 31) {
                    adDay -= 31;
                    adMonth++;
                }
                if (adMonth > 12) {
                    adMonth -= 12;
                    adYear++;
                }

                const adDate = new Date(adYear, adMonth-1, adDay);
                const formattedAD = adDate.toLocaleDateString('en-CA');

                resultDiv.innerHTML = `
                    <strong>\( {bsYear}- \){String(bsMonth).padStart(2,'0')}-${String(bsDay).padStart(2,'0')} BS</strong><br>
                    ↓<br>
                    <strong style="color:#166534;font-size:1.65rem;">${formattedAD} AD</strong>
                `;
            } catch(e) {
                resultDiv.innerHTML = `<span style="color:red">Invalid Date</span>`;
            }
        }

        function convertADToBS() {
            let input = document.getElementById('adDate').value.trim();
            const resultDiv = document.getElementById('result');
            
            try {
                let [adYear, adMonth, adDay] = input.split(/[-\/]/).map(n => parseInt(n));
                
                let bsYear = adYear + 57;
                let bsMonth = adMonth + 4;
                let bsDay = adDay - 13;

                if (bsMonth > 12) {
                    bsMonth -= 12;
                    bsYear++;
                }
                if (bsDay < 1) {
                    bsMonth--;
                    if (bsMonth < 1) {
                        bsMonth = 12;
                        bsYear--;
                    }
                    bsDay += 30; // approximate
                }

                resultDiv.innerHTML = `
                    <strong>\( {adYear}- \){String(adMonth).padStart(2,'0')}-${String(adDay).padStart(2,'0')} AD</strong><br>
                    ↓<br>
                    <strong style="color:#166534;font-size:1.65rem;">\( {bsYear}- \){String(bsMonth).padStart(2,'0')}-${String(bsDay).padStart(2,'0')} BS</strong>
                `;
            } catch(e) {
                resultDiv.innerHTML = `<span style="color:red">Invalid Date</span>`;
            }
        }

        // Auto convert on load
        window.onload = () => convertBSToAD();
    </script>

    <script src="/components.js"></script>
</body>
</html>
