  2073:[31,31,32,31,31,31,30,29,30,29,30,30],

  2078:[31,32,31,32,31,30,30,29,30,29,30,30],
  2079:[31,32,31,32,31,30,30,29,30,29,30,30],
  2080:[31,31,32,32,31,30,30,29,30,29,30,30],
  2081:[31,31,32,31,31,31,30,29,30,29,30,30],
  2082:[31,32,31,32,31,30,30,29,30,29,30,30],

  2086:[31,32,31,32,31,30,30,29,30,29,30,30],
  2087:[31,32,31,32,31,30,30,29,30,29,30,30],
  2088:[31,31,32,32,31,30,30,29,30,29,30,30],
  2089:[31,31,32,31,31,31,30,29,30,29,30,30],
  2090:[31,32,31,32,31,30,30,29,30,29,30,30],
};

const BS_START_AD = { year: 1913, month: 4, day: 13 }; // 1 Baisakh 1970 BS = 13 April 1913 AD
const BS_START_BS = { year: 1970, month: 1, day: 1 };

const BS_MONTHS_EN = ['Baisakh','Jestha','Ashadh','Shrawan','Bhadra','Ashwin','Kartik','Mangsir','Poush','Magh','Falgun','Chaitra'];
const BS_MONTHS_NE = ['बैशाख','जेठ','असार','साउन','भदौ','असोज','कार्तिक','मंसिर','पुष','माघ','फागुन','चैत'];
const AD_MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_EN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_NE = ['आइतबार','सोमबार','मंगलबार','बुधबार','बिहिबार','शुक्रबार','शनिबार'];

function toNepaliNumerals(n) {
  const ne = ['०','१','२','३','४','५','६','७','८','९'];
  return String(n).split('').map(c => ne[+c] ?? c).join('');
}

function bsTotalDays(yr, mo, dy) {
  let total = 0;
  for (let y = 1970; y < yr; y++) {
    if (!bsData[y]) break;
    total += bsData[y].reduce((a,b)=>a+b,0);
  }
  const months = bsData[yr];
  if (!months) return null;
  for (let m = 0; m < mo-1; m++) total += months[m];
  total += dy - 1;
  return total;
}

function addDaysToDate(y, m, d, days) {
  const date = new Date(y, m-1, d);
  date.setDate(date.getDate() + days);
  return { year: date.getFullYear(), month: date.getMonth()+1, day: date.getDate(), dow: date.getDay() };
}

function adTotalDaysSinceStart(yr, mo, dy) {
  const start = new Date(BS_START_AD.year, BS_START_AD.month-1, BS_START_AD.day);
  const target = new Date(yr, mo-1, dy);
  return Math.round((target - start) / 86400000);
}

function bsFromDayOffset(offset) {
  let y = 1970, m = 1;
  let rem = offset;
  for (let yr = 1970; yr <= 2090; yr++) {
    if (!bsData[yr]) break;
    const total = bsData[yr].reduce((a,b)=>a+b,0);
    if (rem < total) { y = yr; break; }
    rem -= total;
  }
  const months = bsData[y];
  for (let mi = 0; mi < 12; mi++) {
    if (rem < months[mi]) { m = mi+1; break; }
    rem -= months[mi];
  }
  return { year: y, month: m, day: rem+1 };
}

function convertBStoAD() {
  const yr = parseInt(document.getElementById('bs-year').value);
  const mo = parseInt(document.getElementById('bs-month').value);
  const dy = parseInt(document.getElementById('bs-day').value);

  const err = document.getElementById('error-bs-to-ad');
  const res = document.getElementById('result-bs-to-ad');
  err.classList.remove('show'); res.classList.remove('show');

  if (!yr || !dy) { showError(err, 'Please enter year and day.'); return; }
  if (!bsData[yr]) { showError(err, `Year ${yr} BS is outside the supported range (1970–2090 BS).`); return; }
  const maxDay = bsData[yr][mo-1];
  if (dy < 1 || dy > maxDay) { showError(err, `${BS_MONTHS_EN[mo-1]} ${yr} BS has only ${maxDay} days.`); return; }

  const offset = bsTotalDays(yr, mo, dy);
  const ad = addDaysToDate(BS_START_AD.year, BS_START_AD.month, BS_START_AD.day, offset);

  document.getElementById('r-ad-main').textContent = `${ad.day} ${AD_MONTHS[ad.month-1]} ${ad.year}`;
  document.getElementById('r-ad-nep').textContent = `${toNepaliNumerals(dy)} ${BS_MONTHS_NE[mo-1]} ${toNepaliNumerals(yr)} — ${toNepaliNumerals(ad.day)} ${AD_MONTHS[ad.month-1]} ${toNepaliNumerals(ad.year)}`;
  document.getElementById('r-ad-day').textContent = DAYS_EN[ad.dow] + ' · ' + DAYS_NE[ad.dow];
  res.classList.add('show');
}

function convertADtoBS() {
  const yr = parseInt(document.getElementById('ad-year').value);
  const mo = parseInt(document.getElementById('ad-month').value);
  const dy = parseInt(document.getElementById('ad-day').value);

  const err = document.getElementById('error-ad-to-bs');
  const res = document.getElementById('result-ad-to-bs');
  err.classList.remove('show'); res.classList.remove('show');

  if (!yr || !dy) { showError(err, 'Please enter year and day.'); return; }
  const offset = adTotalDaysSinceStart(yr, mo, dy);
  if (offset < 0) { showError(err, 'Date is before the supported range (April 13, 1913 AD / 1 Baisakh 1970 BS).'); return; }

  const bs = bsFromDayOffset(offset);
  if (!bsData[bs.year]) { showError(err, 'Date is outside the supported BS range (1970–2090 BS).'); return; }

  const dow = new Date(yr, mo-1, dy).getDay();
  document.getElementById('r-bs-main').textContent = `${bs.day} ${BS_MONTHS_EN[bs.month-1]} ${bs.year} BS`;
  document.getElementById('r-bs-nep').textContent = `${toNepaliNumerals(bs.day)} ${BS_MONTHS_NE[bs.month-1]} ${toNepaliNumerals(bs.year)}`;
  document.getElementById('r-bs-day').textContent = DAYS_EN[dow] + ' · ' + DAYS_NE[dow];
  res.classList.add('show');
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
}

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// Fill today
(function() {
  const today = new Date();
  const yr = today.getFullYear(), mo = today.getMonth()+1, dy = today.getDate();
  document.getElementById('today-ad').textContent = `${dy} ${AD_MONTHS[mo-1]} ${yr}`;

  const offset = adTotalDaysSinceStart(yr, mo, dy);
  if (offset >= 0) {
    const bs = bsFromDayOffset(offset);
    document.getElementById('today-bs').textContent = `${bs.day} ${BS_MONTHS_EN[bs.month-1]} ${bs.year} BS`;
    document.getElementById('today-bs-nep').textContent = `${toNepaliNumerals(bs.day)} ${BS_MONTHS_NE[bs.month-1]} ${toNepaliNumerals(bs.year)}`;
  }

  // Pre-fill AD inputs with today
  document.getElementById('ad-year').value = yr;
  document.getElementById('ad-month').value = mo;
  document.getElementById('ad-day').value = dy;

  // Pre-fill BS with today's BS
  const offset2 = adTotalDaysSinceStart(yr, mo, dy);
  if (offset2 >= 0) {
    const bs = bsFromDayOffset(offset2);
    document.getElementById('bs-year').value = bs.year;
    document.getElementById('bs-month').value = bs.month;
    document.getElementById('bs-day').value = bs.day;
  }
})();
