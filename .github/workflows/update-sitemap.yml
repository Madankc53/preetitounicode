name: Auto-update sitemap

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC; adjust if you want

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap
        env:
          BASE_URL: ${{ secrets.SITE_BASE_URL }}   # set this in repo Settings → Secrets
        run: node scripts/generate-sitemap.js

      - name: Commit and push sitemap if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "sitemap.xml"; then
            git add sitemap.xml
            git commit -m "chore: update sitemap [skip ci]"
            git push
          else
            echo "No sitemap changes."
          fi
