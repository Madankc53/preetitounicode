name: Generate Sitemap

on:
  push:
    branches:
      - main # If your default branch is named 'master', change 'main' to 'master'

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sitemap
        id: sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://converter.thenepal.io/

      - name: Commit and Push Sitemap
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated sitemap update"
          git push
