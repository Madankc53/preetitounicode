name = "preeti-converter"
type = "javascript"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Build configuration
[build]
command = "npm run build"
cwd = "."

[build.upload]
format = "modules"
main = "src/index.js"

# Static site configuration
[site]
bucket = "./preeti-converter"
include = ["*.html", "*.css", "*.js"]
exclude = ["node_modules", ".git", "*.md"]

[env.production]
name = "preeti-converter-prod"
route = "https://preeti-converter.dev/*"

[env.production.site]
bucket = "./preeti-converter"
