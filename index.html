    <script>
        // ═══════════════════════════════════════════════════
        // PREETI ↔ UNICODE CONVERTER – loads map from JSON
        // Copyright © thenepal.io
        // ═══════════════════════════════════════════════════

        let PREETI_FULL_MAP = null;
        let FORWARD_MAP = new Map();
        let REVERSE_MAP = new Map();
        let FONT_MAPS = {
            preeti: { forward: FORWARD_MAP, reverse: REVERSE_MAP },
            kantipur: { forward: {}, reverse: {} },
            pcsnepali: { forward: {}, reverse: {} }
        };
        let currentMode = 'pu';
        let currentFont = 'preeti';
        let uploadedFiles = [];
        let hashUpdateTimeout;

        // ─── Load Preeti map from JSON ───────────────────
        async function loadMap() {
            try {
                const resp = await fetch('preeti-map.json');
                PREETI_FULL_MAP = await resp.json();
                buildMaps();
            } catch (e) {
                console.error('Failed to load preeti-map.json', e);
                showToast('⚠️ Map loading error – check preeti-map.json');
            }
        }

        function buildMaps() {
            // Forward map
            FORWARD_MAP.clear();
            const { normal, shift, alt_codes } = PREETI_FULL_MAP.mappings;
            [normal, shift, alt_codes].forEach(group => {
                for (const [ch, uni] of Object.entries(group)) {
                    FORWARD_MAP.set(ch, uni);
                }
            });

            // Reverse map: prefer normal, then shift, then alt_codes
            REVERSE_MAP.clear();
            [normal, shift, alt_codes].forEach(group => {
                for (const [ch, uni] of Object.entries(group)) {
                    if (!REVERSE_MAP.has(uni)) {
                        REVERSE_MAP.set(uni, ch);
                    }
                }
            });

            // Build Kantipur map (embedded fallback)
            const K2U_SINGLE = {
                'k':'क','l':'ख','m':'ग','n':'घ','o':'ङ','p':'च','q':'छ','r':'ज','s':'झ','t':'ञ',
                'u':'ट','v':'ठ','w':'ड','x':'ढ','y':'ण','z':'त','A':'थ','B':'द','C':'ध','D':'न',
                'E':'प','F':'फ','G':'ब','H':'भ','I':'म','J':'य','K':'र','L':'ल','M':'व','N':'श',
                'O':'ष','P':'स','Q':'ह','a':'अ','b':'आ','c':'इ','d':'ई','e':'उ','f':'ऊ','g':'ए',
                'h':'ऐ','i':'ओ','j':'औ','R':'क्ष','S':'त्र','T':'ज्ञ','[':'ि',']':'ी','{':'ु',
                '}':'ू',';':'े',"'":'ै','/':'ो','?':'ौ','.':'।',',':'ं','<':'ँ','>':'ः',
                '1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९','0':'०',
                ' ':' ','\n':'\n','\t':'\t'
            };
            FONT_MAPS.kantipur.forward = K2U_SINGLE;
            const kRev = {};
            for (const [k,v] of Object.entries(K2U_SINGLE)) {
                if (!kRev[v] && k.length === 1 && ![' ','\n','\t'].includes(k)) kRev[v] = k;
            }
            FONT_MAPS.kantipur.reverse = kRev;

            // PCS Nepali (similar to Preeti)
            const PCS2U_SINGLE = { ...Object.fromEntries(FORWARD_MAP) };
            FONT_MAPS.pcsnepali.forward = PCS2U_SINGLE;
            const pcsRev = {};
            for (const [k,v] of Object.entries(PCS2U_SINGLE)) {
                if (!pcsRev[v] && k.length === 1 && ![' ','\n','\t'].includes(k)) pcsRev[v] = k;
            }
            FONT_MAPS.pcsnepali.reverse = pcsRev;
        }

        // ─── Conversion Engine ────────────────────────────
        function forwardConvert(text, forwardMap) {
            // Apply multi-character rules first
            if (PREETI_FULL_MAP?.rules) {
                for (const rule of PREETI_FULL_MAP.rules) {
                    const escaped = rule.find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(escaped, 'g');
                    text = text.replace(regex, rule.replace);
                }
            }
            // Then single character replacement
            let result = '';
            for (const ch of text) {
                result += forwardMap.get?.(ch) || forwardMap[ch] || ch;
            }
            // Fix matra order
            result = result.replace(/ि([क-हक्षज्ञत्रश्र])/g, '$1ि');
            result = result.replace(/ी([क-हक्षज्ञत्रश्र])/g, '$1ी');
            return result;
        }

        function reverseConvert(text, reverseMap, forwardMap) {
            // Apply multi-character rules in reverse
            if (PREETI_FULL_MAP?.rules) {
                for (const rule of PREETI_FULL_MAP.rules) {
                    const escapedUni = rule.replace.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(escapedUni, 'g');
                    text = text.replace(regex, rule.find);
                }
            }
            // Single characters
            let result = '';
            for (const ch of text) {
                result += reverseMap.get?.(ch) || reverseMap[ch] || ch;
            }
            // Fix ि matra swap
            result = result.replace(/([क-हक्षज्ञत्रश्र])l/g, 'l$1');
            return result;
        }

        function convertText(text, mode, font) {
            if (!text) return '';
            const fontData = FONT_MAPS[font];
            if (mode === 'pu') {
                return forwardConvert(text, fontData.forward);
            } else {
                return reverseConvert(text, fontData.reverse, fontData.forward);
            }
        }
