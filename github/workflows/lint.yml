name: Code Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HTML Validator
        uses: cyb3r-jak3/html5validator-action@v7.2.0
        with:
          root: '.'
