<!-- header.html - Professional Modern Header 2026 with AdSense -->
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .site-header {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 2px solid rgba(59, 130, 246, 0.3);
    }

    .header-content {
        max-width: 1280px;
        margin: 0 auto;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
    }

    /* Logo */
    .logo a {
        display: flex;
        align-items: center;
        text-decoration: none;
        gap: 12px;
        transition: all 0.3s ease;
        min-width: fit-content;
    }

    .logo a:hover {
        transform: translateY(-2px);
    }

    .logo-icon {
        font-size: 36px;
        line-height: 1;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .logo-content {
        display: flex;
        flex-direction: column;
    }

    .logo-text {
        font-size: 1.55rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(90deg, #f8fafc, #cbd5e1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .logo-tag {
        font-size: 0.7rem;
        color: #60a5fa;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-top: -4px;
    }

    /* Search Bar */
    .search-container {
        flex: 1;
        max-width: 400px;
        display: flex;
        align-items: center;
        position: relative;
    }

    .search-input {
        width: 100%;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        color: #f1f5f9;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .search-input::placeholder {
        color: #64748b;
    }

    .search-input:focus {
        outline: none;
        border-color: #60a5fa;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 0 20px rgba(96, 165, 250, 0.2);
    }

    /* Suggestions */
    .search-suggestions {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid rgba(96,165,250,0.15);
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        max-height: 400px;
        overflow-y: auto;
        z-index: 1500;
        display: none;
    }

    .search-suggestions.active {
        display: block;
        animation: slideDown 0.18s ease;
    }

    .suggestion-item {
        padding: 12px 16px;
        color: #cbd5e1;
        font-size: 0.92rem;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        transition: all 0.2s ease;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
        background: rgba(96,165,250,0.1);
        color: #60a5fa;
        padding-left: 20px;
    }

    .suggestion-title {
        font-weight: 600;
        flex: 1;
    }

    .suggestion-url {
        color: #94a3b8;
        font-size: 0.8rem;
        opacity: 0.7;
    }

    .suggestion-icon {
        margin-right: 8px;
        font-size: 0.9rem;
    }

    /* Desktop Navigation */
    .nav-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .desktop-nav {
        display: flex;
        align-items: center;
    }

    .nav-links {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 4px;
    }

    .nav-links li {
        position: relative;
    }

    .nav-links > li > a {
        color: #cbd5e1;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        padding: 10px 16px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
        border-radius: 8px;
    }

    .nav-links > li > a:hover,
    .nav-links > li > a.active {
        color: #60a5fa;
        background: rgba(96, 165, 250, 0.1);
    }

    .nav-links > li > a.active {
        background: rgba(96, 165, 250, 0.15);
        border-bottom: 2px solid #60a5fa;
    }

    /* Dropdown Menu */
    .dropdown-trigger {
        cursor: pointer;
        position: relative;
    }

    .dropdown-trigger::after {
        content: '▼';
        font-size: 0.65rem;
        margin-left: 4px;
        transition: transform 0.3s ease;
    }

    .dropdown-trigger.active::after {
        transform: rotate(180deg);
    }

    .dropdown-menu {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid rgba(96, 165, 250, 0.2);
        border-radius: 12px;
        min-width: 280px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        list-style: none;
        padding: 8px 0;
        z-index: 2000;
        animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .dropdown-menu.active {
        display: block;
    }

    .dropdown-menu li a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 20px;
        color: #cbd5e1;
        text-decoration: none;
        transition: all 0.2s ease;
        font-size: 0.92rem;
    }

    .dropdown-menu li a::before {
        content: '→';
        opacity: 0;
        transform: translateX(-8px);
        transition: all 0.2s ease;
        font-size: 0.85rem;
    }

    .dropdown-menu li a:hover {
        background: rgba(96, 165, 250, 0.1);
        color: #60a5fa;
        padding-left: 24px;
    }

    .dropdown-menu li a:hover::before {
        opacity: 1;
        transform: translateX(0);
    }

    .dropdown-menu .menu-label {
        padding: 10px 20px;
        color: #64748b;
        font-size: 0.8rem;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Language & Mobile Toggle */
    .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .lang-switcher {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 8px 14px;
        border-radius: 8px;
        color: #cbd5e1;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .lang-switcher:hover {
        background: rgba(96, 165, 250, 0.1);
        border-color: #60a5fa;
        color: #60a5fa;
    }

    /* Mobile Menu Toggle */
    .mobile-menu-toggle {
        display: none;
        background: none;
        border: none;
        width: 42px;
        height: 42px;
        cursor: pointer;
        font-size: 24px;
        color: #cbd5e1;
        transition: all 0.3s ease;
        border-radius: 8px;
    }

    .mobile-menu-toggle:hover {
        background: rgba(96, 165, 250, 0.1);
        color: #60a5fa;
    }

    /* Mobile Menu */
    .mobile-menu {
        display: none;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border-top: 1px solid rgba(96, 165, 250, 0.2);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        max-height: calc(100vh - 70px);
        overflow-y: auto;
        z-index: 999;
    }

    .mobile-menu.active {
        display: block;
        animation: slideDown 0.3s ease;
    }

    .mobile-nav-links {
        list-style: none;
        padding: 12px 0;
        margin: 0;
    }

    .mobile-nav-links li {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mobile-nav-links a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        color: #cbd5e1;
        text-decoration: none;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }

    .mobile-nav-links a:hover,
    .mobile-nav-links a.active {
        background: rgba(96, 165, 250, 0.1);
        color: #60a5fa;
        padding-left: 24px;
    }

    .mobile-nav-links a::before {
        content: '→';
        opacity: 0;
        transform: translateX(-8px);
        transition: all 0.2s ease;
    }

    /* AdSense Banner */
    .ad-wrap {
        text-align: center;
        padding: 8px 20px;
        background: rgba(0, 0, 0, 0.2);
        border-top: 1px solid rgba(96, 165, 250, 0.1);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .header-content {
            gap: 12px;
        }

        .search-container {
            display: none;
        }

        .desktop-nav {
            display: none;
        }

        .mobile-menu-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 1.2rem;
        }
    }
</style>

<script>
    // ==================== POWERFUL SEARCH ENGINE ====================
    // Database of searchable items
    const searchDatabase = [
        { title: 'Preeti to Unicode', url: '/tools/preeti-to-unicode', category: 'Tool', icon: '🔄' },
        { title: 'Unicode to Preeti', url: '/tools/unicode-to-preeti', category: 'Tool', icon: '🔄' },
        { title: 'Devanagari Tools', url: '/tools/devanagari', category: 'Tool', icon: '📝' },
        { title: 'Converter', url: '/converter', category: 'Main', icon: '⚙️' },
        { title: 'Home', url: '/', category: 'Main', icon: '🏠' },
        { title: 'About Us', url: '/about', category: 'Info', icon: 'ℹ️' },
        { title: 'Contact Us', url: '/contact', category: 'Info', icon: '📧' },
        { title: 'Nepali Text', url: '/converter', category: 'Feature', icon: '🇳🇵' },
        { title: 'Unicode Conversion', url: '/converter', category: 'Feature', icon: '🔤' },
        { title: 'Font Converter', url: '/converter', category: 'Feature', icon: '🔡' },
    ];

    const searchInput = document.getElementById('searchInput');
    const searchSuggestions = document.getElementById('searchSuggestions');

    // Fuzzy Search Algorithm
    function fuzzySearch(query, items) {
        const lowerQuery = query.toLowerCase().trim();
        if (lowerQuery.length === 0) return [];

        return items
            .map(item => {
                const titleLower = item.title.toLowerCase();
                const categoryLower = item.category.toLowerCase();
                
                let score = 0;
                
                // Exact match gets highest score
                if (titleLower === lowerQuery) score += 100;
                // Starts with query
                else if (titleLower.startsWith(lowerQuery)) score += 80;
                // Contains query as word
                else if (titleLower.includes(' ' + lowerQuery)) score += 60;
                // Contains query
                else if (titleLower.includes(lowerQuery)) score += 40;
                // Category match
                else if (categoryLower.includes(lowerQuery)) score += 20;
                
                // Levenshtein distance for typo tolerance
                if (score < 40) {
                    const distance = levenshteinDistance(lowerQuery, titleLower);
                    if (distance <= 2) score += 30;
                }
                
                return { ...item, score };
            })
            .filter(item => item.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 8); // Show top 8 results
    }

    // Levenshtein Distance for typo tolerance
    function levenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) {
            matrix[i] = [i];
        }
        for (let j = 0; j <= a.length; j++) {
            matrix[0][j] = j;
        }
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j] + 1
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    // Display suggestions
    function displaySuggestions(query) {
        const results = fuzzySearch(query, searchDatabase);
        
        if (results.length === 0) {
            searchSuggestions.innerHTML = `
                <div class="suggestion-item">
                    <span class="suggestion-title">No results found for "${query}"</span>
                </div>
            `;
            searchSuggestions.classList.add('active');
            return;
        }

        searchSuggestions.innerHTML = results
            .map(item => `
                <div class="suggestion-item" onclick="window.location.href='${item.url}'">
                    <div style="flex: 1; display: flex; align-items: center; gap: 10px;">
                        <span class="suggestion-icon">${item.icon}</span>
                        <span class="suggestion-title">${item.title}</span>
                    </div>
                    <span class="suggestion-url">${item.category}</span>
                </div>
            `)
            .join('');
        
        searchSuggestions.classList.add('active');
    }

    // Search input event listeners
    if (searchInput) {
        searchInput.addEventListener('input', function (e) {
            const value = e.target.value.trim();
            if (value.length >= 1) {
                displaySuggestions(value);
            } else {
                searchSuggestions.classList.remove('active');
            }
        });

        searchInput.addEventListener('blur', function () {
            setTimeout(() => {
                searchSuggestions.classList.remove('active');
            }, 200);
        });

        searchInput.addEventListener('focus', function () {
            if (this.value.length >= 1) {
                displaySuggestions(this.value);
            }
        });

        // Allow Enter key to search
        searchInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const results = fuzzySearch(this.value, searchDatabase);
                if (results.length > 0) {
                    window.location.href = results[0].url;
                }
            }
        });
    }

    // ==================== DROPDOWN MENU ====================
    const dropdownTrigger = document.getElementById('dropdownTrigger');
    const dropdownMenu = document.getElementById('dropdownMenu');

    if (dropdownTrigger && dropdownMenu) {
        dropdownTrigger.addEventListener('click', function (e) {
            e.preventDefault();
            this.classList.toggle('active');
            dropdownMenu.classList.toggle('active');
        });

        document.addEventListener('click', function (e) {
            if (!dropdownTrigger.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownTrigger.classList.remove('active');
                dropdownMenu.classList.remove('active');
            }
        });
    }
</script>
