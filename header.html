<!-- header.html - Self-contained Professional Header -->
<style>
    .site-header {
        background: #ffffff;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid #f1f1f1;
    }

    .header-content {
        max-width: 1280px;
        margin: 0 auto;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .logo a {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #1f2937;
    }

    .logo-icon {
        font-size: 36px;
        margin-right: 12px;
    }

    .logo-text {
        font-size: 1.65rem;
        font-weight: 800;
        letter-spacing: -0.03em;
    }

    .logo-tag {
        display: block;
        font-size: 0.78rem;
        color: #dc2626;
        margin-top: -4px;
        font-weight: 600;
    }

    /* Desktop Navigation */
    .nav-links {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 32px;
    }

    .nav-links a {
        color: #374151;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s;
        position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
        color: #dc2626;
    }

    .nav-links a.active::after {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 100%;
        height: 2.5px;
        background: #dc2626;
    }

    /* Mobile Button */
    .mobile-menu-toggle {
        display: none;
        background: none;
        border: none;
        width: 42px;
        height: 42px;
        cursor: pointer;
        font-size: 28px;
        color: #1f2937;
    }

    /* Mobile Menu */
    .mobile-menu {
        display: none;
        background: #ffffff;
        border-top: 1px solid #e5e7eb;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .mobile-nav-links {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .mobile-nav-links li a {
        display: block;
        padding: 18px 25px;
        color: #374151;
        text-decoration: none;
        font-size: 1.12rem;
        border-bottom: 1px solid #f3f4f6;
    }

    .mobile-nav-links a.active {
        background: #fef2f2;
        color: #dc2626;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .desktop-nav {
            display: none;
        }
        .mobile-menu-toggle {
            display: block;
        }
        .mobile-menu.active {
            display: block;
        }
    }
</style>

<header class="site-header">
    <div class="header-content">
        <!-- Logo -->
        <div class="logo">
            <a href="https://converter.thenepal.io">
                <span class="logo-icon">🇳🇵</span>
                <div>
                    <span class="logo-text">thenepal.io</span>
                    <span class="logo-tag">Converter</span>
                </div>
            </a>
        </div>

        <!-- Desktop Menu -->
        <nav class="desktop-nav">
            <ul class="nav-links">
                <li><a href="https://converter.thenepal.io">Home</a></li>
                <li><a href="#" class="active">जग्गा कन्वर्टर</a></li>
                <li><a href="#">Unit Converter</a></li>
                <li><a href="https://gpatopercentage.thenepal.io">GPA Calculator</a></li>
                <li><a href="https://thenepal.io" target="_blank">Blog</a></li>
            </ul>
        </nav>

        <!-- Mobile Toggle -->
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle Menu">
            ☰
        </button>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <ul class="mobile-nav-links">
            <li><a href="https://converter.thenepal.io">Home</a></li>
            <li><a href="#" class="active">जग्गा कन्वर्टर</a></li>
            <li><a href="#">Unit Converter</a></li>
            <li><a href="https://gpatopercentage.thenepal.io">GPA Calculator</a></li>
            <li><a href="https://thenepal.io" target="_blank">Blog</a></li>
        </ul>
    </div>
</header>
