<!-- JavaScript for Mobile Menu with proper functionality -->
<script>
    (function() {
        // DOM Elements
        const header = document.querySelector('.site-header');
        const toggleBtn = document.getElementById('mobileMenuToggle');
        const navMenu = document.getElementById('navLinks');
        
        // Create overlay element for backdrop
        let overlay = document.querySelector('.menu-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.className = 'menu-overlay';
            document.body.appendChild(overlay);
        }

        // ===== SCROLL EFFECT: adds 'scrolled' class to header =====
        function handleScroll() {
            if (window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }
        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll();

        // ===== MOBILE MENU FUNCTIONS =====
        function closeMenu() {
            if (!navMenu.classList.contains('open')) return;
            
            navMenu.classList.remove('open');
            toggleBtn.classList.remove('active');
            overlay.classList.remove('active');
            document.body.classList.remove('menu-open');
            toggleBtn.setAttribute('aria-expanded', 'false');
        }

        function openMenu() {
            if (navMenu.classList.contains('open')) return;
            
            navMenu.classList.add('open');
            toggleBtn.classList.add('active');
            overlay.classList.add('active');
            document.body.classList.add('menu-open');
            toggleBtn.setAttribute('aria-expanded', 'true');
        }

        // Toggle menu on button click
        if (toggleBtn && navMenu) {
            toggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (navMenu.classList.contains('open')) {
                    closeMenu();
                } else {
                    openMenu();
                }
            });

            // Close menu when clicking on overlay
            overlay.addEventListener('click', () => {
                closeMenu();
            });

            // Close menu when clicking on any nav link
            const navLinks = navMenu.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    closeMenu();
                });
            });

            // Handle escape key press
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && navMenu.classList.contains('open')) {
                    closeMenu();
                }
            });

            // Handle window resize: if resizing to desktop while menu open, close it
            window.addEventListener('resize', () => {
                if (window.innerWidth > 860 && navMenu.classList.contains('open')) {
                    closeMenu();
                }
            });
        }
    })();
</script>
